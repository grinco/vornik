name: Feature request
description: Propose a new capability or a behaviour change
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Help us understand the problem before the solution. A concrete use
        case with a worked example is more useful than an abstract wish.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and why is it hard or impossible with vornik today?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: |
        How should vornik handle this? Be as concrete as you can — API shape,
        config field, behaviour change, new CLI command, etc. Sketches are
        welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why the proposed solution is preferable.

  - type: dropdown
    id: area
    attributes:
      label: Affected component
      options:
        - executor / worktree
        - scheduler / queue / leasing
        - autonomy manager
        - dispatcher / chat client
        - telegram bot
        - MCP integration
        - persistence / migrations
        - config / registry / reload
        - UI / API
        - agent runtime (container, entrypoint, mcp-bridge)
        - observability / metrics / tracing
        - new subsystem
        - docs / examples

  - type: textarea
    id: compat
    attributes:
      label: Backwards compatibility
      description: |
        Would this change break existing configs, workflows, running
        executions, or the HTTP API? If so, is there a migration path?

  - type: checkboxes
    attributes:
      label: Contribution
      options:
        - label: I'm willing to send a PR if maintainers agree on the approach
