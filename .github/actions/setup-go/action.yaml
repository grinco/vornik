name: Setup Go
description: Install Go and optionally download modules.

inputs:
  go-version:
    description: Go version to install.
    required: true
  download-deps:
    description: Whether to run go mod download.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}

    - name: Download dependencies
      if: ${{ inputs.download-deps == 'true' }}
      shell: bash
      run: go mod download
