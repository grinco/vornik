# Exclude ONLY the secret-detectors own test fixtures from secret scanning +
# push protection. internal/secrets/*_test.go deliberately embeds fake tokens
# (AKIAQWERTYUIOPASDFGH, xoxb-1111..., a fake GitLab PAT) to exercise the
# detector; they are NOT real credentials. Scoped to *_test.go so all
# non-test code in the package stays fully scanned.
paths-ignore:
  - "internal/secrets/*_test.go"
  - "internal/secrets/**/*_test.go"
