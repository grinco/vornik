# Vornik Community Edition — public CI (artifact-purity gates).
# Injected into the public repo at export time by scripts/export-public-ce.sh.
#
# Actions are pinned to commit SHAs (supply-chain hygiene); the trailing
# comment records the human-readable version — bump both together.
# Jobs: build-test (unit) · integration (Postgres) · artifact-purity (no-EE /
# docs-drift / no-trading) · release (on a v* tag: build + CycloneDX SBOM +
# SLSA build-provenance & SBOM attestations + GitHub release).
name: ci
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then echo "gofmt needed:"; echo "$unformatted"; exit 1; fi
      - run: go build ./...
      - run: go vet ./...
      # Unit tests. Integration (`//go:build integration`) and e2e
      # (`//go:build e2e`) suites are excluded by build tag — they run in the
      # integration job below. This also runs the artifact-purity gates in
      # internal/architecture (TestNoEnterpriseInTree, TestCommunityMainIsEEFree)
      # and the editions matrix failsafe (internal/editions
      # TestCrossCheck_CleanOnRealRegistry).
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector-bundled Postgres: the memory subsystem declares vector()
        # columns, so the vanilla postgres image fails at that migration.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vornik
          POSTGRES_PASSWORD: vornik
          POSTGRES_DB: vornik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Apply base schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: vornik
          PGPASSWORD: vornik
          PGDATABASE: vornik_test
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client || true
          psql -f deployments/postgres/schema/001_initial.sql || echo "base schema skipped; suites run migrations"
      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://vornik:vornik@localhost:5432/vornik_test?sslmode=disable
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: vornik
          POSTGRES_PASSWORD: vornik
          POSTGRES_DB: vornik_test
        # -p 1: these packages are separate test binaries that Go would run in
        # PARALLEL by default, all against the one shared Postgres DB. Some
        # integration tests do global-scope (no project filter) leases/locks
        # (e.g. lease_priority), so concurrent binaries intermittently steal or
        # lock another test's task -> "no tasks available". Serialise the
        # binaries so each owns the DB for its run; tests are deterministic in
        # isolation. (Within a package, tests already run sequentially.)
        run: go test -p 1 -tags=integration -count=1 ./test/integration/... ./internal/persistence/postgres/... ./internal/cli/...

  artifact-purity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: No Enterprise source or imports in the tree
        run: |
          # Structural: the Enterprise IP directory must not exist.
          if [ -e internal/enterprise ]; then
            echo "FAIL: internal/enterprise present in the Community repo"; exit 1
          fi
          # Imports only (a quoted import path after leading whitespace) — not
          # the many legitimate comments that mention internal/enterprise. The
          # Go import-law test (internal/architecture) is the authoritative
          # transitive check; this is a fast structural backstop.
          if grep -rnE '^[[:space:]]*"[^"]*(internal/enterprise|vornik\.io/vornik/enterprise)' --include='*.go' . ; then
            echo "FAIL: Enterprise package imported in Community source"; exit 1
          fi
      - name: Public docs are generated + drift-free (incl. the CE/EE matrix)
        run: |
          go run ./cmd/docs-gen all
          git diff --exit-code -- docs/public || {
            echo "FAIL: docs/public is stale — run 'make docs-gen'"; exit 1; }
      - name: Public docs carry no trading references
        run: |
          if grep -rIn -i 'trading' docs/public ; then
            echo "FAIL: trading domain is hidden from the public docs"; exit 1
          fi

  # Release: build the CE binaries on a version tag, publish a CycloneDX SBOM,
  # and attach SLSA build-provenance + SBOM attestations (verifiable with
  # `gh attestation verify <file> --repo grinco/vornik`). Runs only on tags.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-test, integration, artifact-purity]
    permissions:
      contents: write       # create the GitHub release + upload assets
      id-token: write       # OIDC, required by the attestation actions
      attestations: write   # store build-provenance + SBOM attestations
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Build CE binaries (reproducible-ish, version-stamped)
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64; do
            os="${t%/*}"; arch="${t#*/}"
            for cmd in vornik vornikctl; do
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
                go build -trimpath \
                  -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME} -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  -o "dist/${cmd}-${os}-${arch}" "./cmd/${cmd}"
            done
          done
          (cd dist && sha256sum * > checksums.txt)
      - name: Generate CE SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/vornik.cdx.json
      - name: Attest build provenance (SLSA) for the binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/vornik-*
            dist/vornikctl-*
      - name: Attest the SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/vornik-linux-amd64
          sbom-path: dist/vornik.cdx.json
      - name: Publish release with binaries + SBOM + checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/vornik-* dist/vornikctl-* dist/checksums.txt dist/vornik.cdx.json
      # TODO(launch): when a CE daemon Containerfile exists, also build the
      # container from digest-pinned public base images and attest it.
