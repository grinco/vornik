# Vornik CLA gate (CLA Assistant Lite). Injected into the public repo.
#
# Setup (operator, one-time): add a repository secret PERSONAL_ACCESS_TOKEN — a
# fine-grained PAT scoped to grinco/vornik with Contents + Pull requests
# read/write. The action uses it to record signatures on the `cla-signatures`
# branch (created on the first signature). The CLA text lives at /CLA.md.
#
# SECURITY (pull_request_target):
#   - `pull_request_target` is REQUIRED so the CLA check can run with the base
#     repo's token/secret on pull requests FROM FORKS (a fork-context
#     `pull_request` has no secret and cannot record a signature).
#   - This job NEVER checks out or executes the PR author's code — it only reads
#     PR metadata and posts comments / records signatures via the API. There is
#     no `actions/checkout` of the PR head, so the classic "pwn request"
#     secret-exfiltration path does not exist. Do NOT add a checkout/build step.
#   - The only action is PINNED TO A COMMIT SHA (not a mutable tag), so the
#     PERSONAL_ACCESS_TOKEN is only ever handed to a fixed, trusted version.
#   - Default-deny permissions; the minimum set is granted at the job level.
name: CLA
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

# Default-deny: any job gets no token permissions unless it grants them.
permissions: {}

jobs:
  cla:
    runs-on: ubuntu-latest
    # Only act on PR events and on the exact sign-off comment — keeps the
    # broad issue_comment trigger from doing anything on unrelated comments.
    if: >-
      github.event_name == 'pull_request_target' ||
      github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
    permissions:
      actions: write          # CLA Assistant re-triggers the check run
      contents: write         # write the signature file to the cla-signatures branch
      pull-requests: write    # post the sign / signed comments
      statuses: write         # set the CLA commit status
    steps:
      # Pinned to v2.6.1 (ca4a40a) — keep in sync if bumped.
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/grinco/vornik/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot],grinco
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
          custom-notsigned-prcomment: >-
            Thank you for your pull request. Before we can merge it, please read
            the [Contributor License Agreement](https://github.com/grinco/vornik/blob/main/CLA.md)
            and sign it by posting a comment containing exactly:
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️'
