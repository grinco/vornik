displayName: "News Feed"
description: |
  A scheduled-research project that polls one or more topics on a
  cadence and writes findings to project memory. Best fit for
  "keep me up to date on X" workloads. Autonomy enabled with a
  cron-style schedule; runs without human-in-the-loop.
domain: "research"

parameters:
  - name: projectId
    type: string
    label: "Project ID"
    description: "Lowercase letters, numbers, and hyphens only."
    pattern: "[a-z0-9][a-z0-9-]{1,30}[a-z0-9]"
    required: true
  - name: displayName
    type: string
    label: "Display name"
    default: "News Feed"
    required: true
  - name: topic
    type: string
    label: "Topic to track"
    description: "Free text — the autonomy goal will instruct the researcher to track this."
    default: "general technology news"
    required: true
  - name: interval
    type: enum
    label: "Refresh cadence"
    description: "How often to run a fresh research pass."
    options:
      - "1h"
      - "4h"
      - "12h"
      - "24h"
    default: "4h"
    required: true
  - name: llmModel
    type: string
    label: "Role model override"
    description: "Optional. Leave blank to inherit the daemon chat model selected during setup."
    default: ""
    required: false

files:
  - source: project.yaml.tmpl
    target: "projects/{{.projectId}}.yaml"
  # Registry loads swarms only from .md files (SWARM.md format —
  # YAML frontmatter + Markdown body) since the 2026-05-17
  # migration; the old swarm.yaml.tmpl was silently ignored.
  - source: swarm.md.tmpl
    target: "swarms/{{.projectId}}-swarm.md"
