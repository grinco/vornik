{{/*
cluster mode — worker StatefulSet (profile: worker).

Uses the full image (includes podman). Runs the scheduler, executor,
and leader-elected singletons. Exposes :8080 (HTTP API) and :8443
(mTLS relay ingress for DMZ webhook nodes).

Multiple replicas are safe: leader election handles all singletons;
the data PVC is per-pod via volumeClaimTemplates. Each replica joins
the lease-contention pool but only the lease-holder runs singleton
workers at any given time.

runtimeMode (privileged / host-socket) applies here exactly as in the
single all-in-one StatefulSet — the worker is the only tier that runs
podman.
*/}}
{{- if and .Values.cluster.enabled .Values.cluster.worker.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vornik.workerFullname" . }}
  labels: {{- include "vornik.workerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.cluster.worker.replicas }}
  serviceName: {{ include "vornik.workerFullname" . }}
  selector:
    matchLabels: {{- include "vornik.workerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "vornik.workerLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/cluster-configmaps.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "vornik.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cluster.worker.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cluster.worker.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cluster.worker.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vornik
          image: {{ include "vornik.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            # mTLS relay ingress port — accepts verified webhook events
            # from DMZ webhook nodes over mutual TLS.
            - name: relay
              containerPort: 8443
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- end }}
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            {{- if eq .Values.runtimeMode "privileged" }}
            privileged: true
            {{- else }}
            privileged: false
            capabilities:
              add: ["SETUID", "SETGID"]
            {{- end }}
          env:
            - name: VORNIK_CONFIG
              value: /etc/vornik/config.yaml
            - name: VORNIK_CONFIGS_DIR
              value: /etc/vornik/configs
            - name: VORNIK_DATA_DIR
              value: /var/lib/vornik
            {{- if eq .Values.runtimeMode "host-socket" }}
            - name: CONTAINER_HOST
              value: unix:///var/run/podman/podman.sock
            {{- end }}
            - name: VORNIK_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vornik.secretName" . }}
                  key: dbPassword
            - name: VORNIK_CHAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vornik.secretName" . }}
                  key: chatApiKey
                  optional: true
            - name: VORNIK_AGENT_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vornik.secretName" . }}
                  key: agentLLMApiKey
                  optional: true
            - name: VORNIK_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vornik.secretName" . }}
                  key: embeddingApiKey
                  optional: true
            {{- if .Values.telegram.enabled }}
            - name: VORNIK_TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vornik.secretName" . }}
                  key: telegramBotToken
            {{- end }}
            - name: AGENT_IMAGE
              value: {{ include "vornik.agentImage" . | quote }}
          resources:
            {{- if .Values.cluster.worker.resources }}
            {{- toYaml .Values.cluster.worker.resources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/vornik/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.registry.existingProjectsConfigMap }}
            - name: projects
              mountPath: /etc/vornik/configs/projects
              readOnly: true
            {{- else if .Values.registry.projects }}
            - name: projects
              mountPath: /etc/vornik/configs/projects
              readOnly: true
            {{- end }}
            {{- if .Values.registry.existingSwarmsConfigMap }}
            - name: swarms
              mountPath: /etc/vornik/configs/swarms
              readOnly: true
            {{- else if .Values.registry.swarms }}
            - name: swarms
              mountPath: /etc/vornik/configs/swarms
              readOnly: true
            {{- end }}
            {{- if .Values.registry.existingWorkflowsConfigMap }}
            - name: workflows
              mountPath: /etc/vornik/configs/workflows
              readOnly: true
            {{- else if .Values.registry.workflows }}
            - name: workflows
              mountPath: /etc/vornik/configs/workflows
              readOnly: true
            {{- end }}
            {{- if .Values.pricing.override }}
            - name: pricing
              mountPath: /etc/vornik/configs/pricing.yaml
              subPath: pricing.yaml
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /var/lib/vornik
            - name: containers-storage
              mountPath: /var/lib/containers
            {{- if eq .Values.runtimeMode "host-socket" }}
            - name: podman-socket
              mountPath: /var/run/podman
              readOnly: false
            {{- end }}
            # mTLS server credentials: server cert/key + client CA.
            # Mounted from the operator-provided Secret (cluster.mtls.secretName).
            - name: mtls
              mountPath: /etc/vornik/mtls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "vornik.workerFullname" . }}-config
        {{- if .Values.registry.existingProjectsConfigMap }}
        - name: projects
          configMap:
            name: {{ .Values.registry.existingProjectsConfigMap }}
        {{- else if .Values.registry.projects }}
        - name: projects
          configMap:
            name: {{ include "vornik.fullname" . }}-projects
        {{- end }}
        {{- if .Values.registry.existingSwarmsConfigMap }}
        - name: swarms
          configMap:
            name: {{ .Values.registry.existingSwarmsConfigMap }}
        {{- else if .Values.registry.swarms }}
        - name: swarms
          configMap:
            name: {{ include "vornik.fullname" . }}-swarms
        {{- end }}
        {{- if .Values.registry.existingWorkflowsConfigMap }}
        - name: workflows
          configMap:
            name: {{ .Values.registry.existingWorkflowsConfigMap }}
        {{- else if .Values.registry.workflows }}
        - name: workflows
          configMap:
            name: {{ include "vornik.fullname" . }}-workflows
        {{- end }}
        {{- if .Values.pricing.override }}
        - name: pricing
          configMap:
            name: {{ include "vornik.fullname" . }}-pricing
        {{- end }}
        - name: containers-storage
          emptyDir: {}
        {{- if eq .Values.runtimeMode "host-socket" }}
        - name: podman-socket
          hostPath:
            path: {{ .Values.podmanHostSocket | quote }}
            type: Socket
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        # mTLS Secret: server.crt + server.key (relay-ingress listener)
        # + ca.crt (client certificate CA for verifying webhook nodes).
        # The Secret is created and managed by the operator — the chart
        # does NOT generate certificates.
        - name: mtls
          secret:
            secretName: {{ .Values.cluster.mtls.secretName | quote }}
            items:
              - key: ca.crt
                path: ca.crt
              - key: server.crt
                path: server.crt
              - key: server.key
                path: server.key
            defaultMode: 0400
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}{{/* cluster.enabled + worker.enabled */}}
