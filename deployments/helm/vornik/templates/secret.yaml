{{- if not .Values.secrets.existingSecret -}}
# vornik secret: DB password, LLM API keys, Telegram token, vornik API
# keys. Kept in one Secret so vornik's pod spec pulls from a single
# secretRef. For production, prefer setting secrets.existingSecret and
# managing the object via Sealed Secrets / ExternalSecrets / Vault.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vornik.fullname" . }}
  labels: {{- include "vornik.labels" . | nindent 4 }}
type: Opaque
# stringData keeps YAML readable during `helm template` / dry-runs.
# Kubernetes base64-encodes these into `.data` on apply.
stringData:
  dbPassword: {{ required "secrets.dbPassword is required (or set secrets.existingSecret)" .Values.secrets.dbPassword | quote }}
  chatApiKey: {{ .Values.secrets.chatApiKey | quote }}
  agentLLMApiKey: {{ .Values.secrets.agentLLMApiKey | quote }}
  embeddingApiKey: {{ .Values.secrets.embeddingApiKey | quote }}
  telegramBotToken: {{ .Values.secrets.telegramBotToken | quote }}
  apiKeys: {{ .Values.secrets.apiKeys | quote }}
{{- end }}
