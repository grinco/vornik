{{- if not .Values.cluster.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vornik.fullname" . }}
  labels: {{- include "vornik.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
  selector: {{- include "vornik.selectorLabels" . | nindent 4 }}
{{- end }}{{/* cluster.enabled=false guard */}}
