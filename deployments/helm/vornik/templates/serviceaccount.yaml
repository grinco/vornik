{{- if .Values.serviceAccount.create -}}
# Dedicated ServiceAccount for the vornik pod. vornik has no
# kubernetes-API integration today, so this carries no RBAC — a plain
# SA is enough to (a) make PSP/PSS policies easier to scope and (b)
# give a clean audit identity in api-server logs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vornik.serviceAccountName" . }}
  labels: {{- include "vornik.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
