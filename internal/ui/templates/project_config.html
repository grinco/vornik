{{define "project_config.html"}}
<!DOCTYPE html>
<html lang="en">
{{template "pageHead" .}}
<body class="bg-dark-900 text-gray-100 min-h-screen flex flex-col">
    {{template "nav" .}}

    <main id="main" tabindex="-1" class="flex-1 max-w-7xl mx-auto w-full py-6 px-4 sm:px-6 lg:px-8 shell-offset">
        <div class="space-y-5">
            <div class="flex items-start justify-between gap-3">
                <div>
                    <h1 class="text-xl font-semibold text-gray-100">Project Config</h1>
                    <p class="text-xs text-gray-500 font-mono mt-1">{{.ProjectID}}{{if .ConfigPath}} · {{.ConfigPath}}{{end}}</p>
                </div>
                <a href="/ui/projects/{{.ProjectID}}" class="flex items-center gap-1 text-gray-500 hover:text-gray-300 text-sm transition-colors">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Project
                </a>
            </div>

            {{if .Success}}
            <div class="rounded-lg border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200">{{.Success}}</div>
            {{end}}
            {{if .Error}}
            <div class="rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-200 whitespace-pre-wrap">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/ui/projects/{{.ProjectID}}/config" class="space-y-4">
                <label for="yamlContent" class="sr-only">Project YAML</label>
                <textarea name="content" id="yamlContent" spellcheck="false" class="w-full min-h-[70vh] rounded-lg border border-dark-700 bg-dark-950 px-4 py-3 text-sm text-gray-100 font-mono leading-6 outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500" style="background-color: #020617;">{{.Content}}</textarea>
                <div class="flex items-center justify-end gap-3">
                    <a href="/ui/projects/{{.ProjectID}}" class="px-4 py-2 rounded-md bg-dark-700 text-gray-300 hover:bg-dark-600 text-sm font-medium">Cancel</a>
                    <button type="submit" class="inline-flex items-center gap-2 px-4 py-2 rounded-md bg-brand-600 text-white hover:bg-brand-500 text-sm font-medium">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                        Save
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
{{end}}
