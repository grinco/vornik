{{define "project_not_found.html"}}
<!DOCTYPE html>
<html lang="en">
{{template "pageHead" .}}
<body class="bg-dark-900 text-gray-100 min-h-screen flex flex-col">
    {{template "nav" .}}

    <main id="main" tabindex="-1" class="flex-1 max-w-7xl mx-auto w-full py-20 px-4 shell-offset">
        <div class="text-center max-w-md mx-auto">
            <div class="p-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 inline-flex mb-6">
                <svg class="h-10 w-10 text-rose-800 dark:text-rose-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2 8.5A2.5 2.5 0 014.5 6H9l2 2h8.5A2.5 2.5 0 0122 10.5V17a2.5 2.5 0 01-2.5 2.5h-15A2.5 2.5 0 012 17V8.5z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-100 mb-2">Project Not Found</h1>
            <p class="text-gray-400 mb-1">The project <code class="font-mono text-gray-300 bg-dark-700 px-1.5 py-0.5 rounded text-sm">{{.ProjectID}}</code> does not exist.</p>
            <p class="text-gray-500 text-sm mb-8">This may happen if the project was deleted or the ID is incorrect.</p>
            <a href="/ui/projects" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Projects
            </a>
        </div>
    </main>
</body>
</html>
{{end}}
