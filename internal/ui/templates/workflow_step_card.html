{{define "workflow_step_card.html"}}
<div class="step-card rounded-xl border border-dark-700 bg-dark-800/40 p-4 space-y-3" data-step-index="{{.Index}}">
    <div class="flex items-center justify-between gap-2">
        <h4 class="text-sm font-semibold text-gray-200 step-card-title">{{if .Name}}{{.Name}}{{else}}New step{{end}}</h4>
        <div class="flex items-center gap-2 text-xs">
            <button type="button" class="text-gray-400 hover:text-gray-200" onclick="wfMoveCard(this,-1)" aria-label="Move up">▲</button>
            <button type="button" class="text-gray-400 hover:text-gray-200" onclick="wfMoveCard(this,1)" aria-label="Move down">▼</button>
            <button type="button" class="text-red-700 dark:text-red-300 hover:text-red-600 dark:text-red-200" onclick="this.closest('.step-card').remove()">Remove</button>
        </div>
    </div>
    {{range .Sections}}
    <details class="rounded-lg border border-dark-700/60" {{if not .Advanced}}open{{end}}>
        <summary class="cursor-pointer select-none px-3 py-2 text-xs font-medium text-gray-300">{{.Title}}{{if .Advanced}} <span class="text-gray-500">(advanced)</span>{{end}}</summary>
        <div class="px-3 pb-3 pt-1 space-y-3">
            {{if .Help}}<p class="text-[11px] text-gray-400">{{.Help}}</p>{{end}}
            {{range .Rows}}{{template "schemaRow" .}}{{end}}
        </div>
    </details>
    {{end}}
</div>
{{end}}
